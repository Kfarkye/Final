apiVersion: apps/v1
kind: Deployment
metadata:
  name: reverie
  labels:
    app: reverie
spec:
  replicas: 1
  selector:
    matchLabels:
      app: reverie
  template:
    metadata:
      labels:
        app: reverie
    spec:
      # Uses the 'default' KSA in namespace 'default', which is annotated with:
      #   iam.gke.io/gcp-service-account: truth-runtime@gen-lang-client-0281999829.iam.gserviceaccount.com
      # This Workload Identity binding gives the pod the truth-runtime GSA's permissions.
      containers:
        - name: reverie
          image: us-central1-docker.pkg.dev/gen-lang-client-0281999829/truth/reverie:latest
          ports:
            - containerPort: 8080
              protocol: TCP
          resources:
            requests:
              cpu: "2"
              memory: "4Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "8080"
            - name: GCP_PROJECT
              value: "gen-lang-client-0281999829"
            - name: GCP_LOCATION
              value: "global"
            - name: SPANNER_PROJECT_ID
              value: "gen-lang-client-0281999829"
            - name: SPANNER_INSTANCE_ID
              value: "clearspace"
            - name: SPANNER_DATABASE_ID
              value: "sports-mlb-db"
            - name: MODEL_REGISTRY_SPANNER_INSTANCE_ID
              value: "clearspace"
            - name: MODEL_REGISTRY_SPANNER_DATABASE_ID
              value: "core-db"
          envFrom:
            - secretRef:
                name: truth-secrets
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 30
