name: Deploy Truth to GKE

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-truth-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    name: Quality Gates
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      GCP_PROJECT: gen-lang-client-0281999829
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: TypeScript Check
        run: npx tsc --noEmit

      - name: Run Tests
        run: npx vitest run

  deploy:
    name: Build & Deploy
    needs: gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Build image (Cloud Build + kaniko cache)
        run: |
          gcloud builds submit \
            --config=cloudbuild.yaml \
            --substitutions=_IMAGE_TAG=${{ github.sha }} \
            --project=gen-lang-client-0281999829

      - name: Create Cloud Deploy release
        # Cloud Build already builds and deploys to GKE via cloudbuild.yaml.
        # Cloud Deploy release creation is currently disabled because the GitHub
        # workload identity lacks clouddeploy.rollouts.create. Keep the step
        # present for traceability, but do not fail production deploys on it.
        if: ${{ false }}
        run: |
          gcloud deploy releases create release-${{ github.run_number }} \
            --delivery-pipeline=truth-pipeline \
            --region=us-central1 \
            --images=reverie=us-central1-docker.pkg.dev/gen-lang-client-0281999829/truth/reverie:${{ github.sha }}

      - name: Show release status
        if: ${{ false }}
        run: |
          gcloud deploy releases describe release-${{ github.run_number }} \
            --delivery-pipeline=truth-pipeline \
            --region=us-central1 \
            --format='value(renderState)'
