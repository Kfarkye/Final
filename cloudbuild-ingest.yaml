steps:
  # Lint gate — same as the main pipeline
  - name: 'node:24-slim'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        npm ci --legacy-peer-deps
        npm run lint

  # Build with kaniko using the ingest-specific Dockerfile
  - name: 'gcr.io/kaniko-project/executor:latest'
    args:
      - '--dockerfile=Dockerfile.ingest'
      - '--destination=us-central1-docker.pkg.dev/$PROJECT_ID/truth/truth-mlb-stats-ingest:$_IMAGE_TAG'
      - '--destination=us-central1-docker.pkg.dev/$PROJECT_ID/truth/truth-mlb-stats-ingest:latest'
      - '--cache=true'
      - '--cache-ttl=168h'
      - '--compressed-caching=false'
      - '--snapshot-mode=redo'
      - '--context=.'

  # Deploy to Cloud Run (private — no unauthenticated access)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: bash
    args:
      - '-c'
      - |
        gcloud run deploy truth-mlb-stats-ingest \
          --image=us-central1-docker.pkg.dev/$PROJECT_ID/truth/truth-mlb-stats-ingest:$_IMAGE_TAG \
          --region=us-central1 \
          --platform=managed \
          --no-allow-unauthenticated \
          --set-env-vars="GCP_PROJECT=$PROJECT_ID,NODE_ENV=production" \
          --memory=512Mi \
          --cpu=1 \
          --min-instances=0 \
          --max-instances=3 \
          --timeout=300

timeout: '1200s'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

substitutions:
  _IMAGE_TAG: 'latest'
