<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title><!-- CUSTOMIZE: API Name --> Explorer</title>
</head>
<body>
  <div class="t-page-full" style="display:flex;height:100vh;padding:0">
    <!-- SIDEBAR: TOOL LIST -->
    <aside style="width:280px;background:var(--t-bg-secondary);border-right:1px solid var(--t-border);display:flex;flex-direction:column;overflow:hidden">
      <div style="padding:var(--t-space-lg)">
        <h2 class="t-h3" style="margin-bottom:var(--t-space-sm)">API Tools</h2>
        <input type="text" class="t-input" id="tool-search" placeholder="Filter tools..." oninput="filterTools()" style="font-size:12px">
      </div>
      <div id="tool-list" style="flex:1;overflow-y:auto;padding:0 var(--t-space-sm) var(--t-space-md)">
        <div class="t-skeleton" style="height:32px;margin:4px 8px;border-radius:var(--t-radius-sm)"></div>
        <div class="t-skeleton" style="height:32px;margin:4px 8px;border-radius:var(--t-radius-sm)"></div>
        <div class="t-skeleton" style="height:32px;margin:4px 8px;border-radius:var(--t-radius-sm)"></div>
      </div>
      <div style="padding:var(--t-space-md);border-top:1px solid var(--t-border)">
        <span class="t-label" id="tool-count">Loading...</span>
      </div>
    </aside>

    <!-- MAIN: REQUEST/RESPONSE -->
    <main style="flex:1;display:flex;flex-direction:column;overflow:hidden">
      <header style="padding:var(--t-space-md) var(--t-space-lg);border-bottom:1px solid var(--t-border);display:flex;align-items:center;justify-content:space-between">
        <div class="t-flex" style="align-items:center;gap:12px">
          <span class="t-badge t-badge-cyan" id="selected-tool">Select a tool</span>
          <span class="t-body" id="selected-desc" style="font-size:12px"></span>
        </div>
        <button class="t-btn t-btn-primary" id="execute-btn" onclick="executeCall()" disabled>▶ Execute</button>
      </header>

      <div style="flex:1;display:grid;grid-template-columns:1fr 1fr;overflow:hidden">
        <!-- REQUEST -->
        <div style="border-right:1px solid var(--t-border);display:flex;flex-direction:column">
          <div style="padding:var(--t-space-sm) var(--t-space-md);border-bottom:1px solid var(--t-border)">
            <span class="t-label">Request Arguments (JSON)</span>
          </div>
          <div style="flex:1;padding:var(--t-space-md)">
            <textarea id="request-body" class="t-input" style="height:100%;resize:none;font-size:12px;line-height:1.6" placeholder='{ "key": "value" }'>{}</textarea>
          </div>
        </div>
        <!-- RESPONSE -->
        <div style="display:flex;flex-direction:column;background:var(--t-bg-input)">
          <div style="padding:var(--t-space-sm) var(--t-space-md);border-bottom:1px solid var(--t-border);display:flex;justify-content:space-between;align-items:center">
            <span class="t-label">Response</span>
            <span class="t-label" id="response-time"></span>
          </div>
          <pre id="response-body" style="flex:1;padding:var(--t-space-md);margin:0;overflow:auto;font-family:var(--t-mono);font-size:12px;line-height:1.6;color:var(--t-text-secondary)">// Click Execute to send a request...</pre>
        </div>
      </div>
    </main>
  </div>

  <script>
    let allTools = [];
    let selectedTool = null;

    async function loadTools() {
      const data = await fetch('/api/debug/tools').then(r => r.json());
      allTools = data.tools || [];
      document.getElementById('tool-count').textContent = `${allTools.length} tools`;
      renderToolList(allTools);
    }

    function renderToolList(tools) {
      document.getElementById('tool-list').innerHTML = tools.map(t => `
        <div onclick="selectTool('${t.name}')" style="padding:8px 12px;cursor:pointer;border-radius:var(--t-radius-sm);font-size:12px;font-family:var(--t-mono);color:${selectedTool===t.name?'var(--t-cyan)':'var(--t-text-secondary)'};background:${selectedTool===t.name?'rgba(6,182,212,0.08)':'transparent'};border-left:2px solid ${selectedTool===t.name?'var(--t-cyan)':'transparent'};transition:all 0.1s" onmouseenter="this.style.background='rgba(255,255,255,0.03)'" onmouseleave="this.style.background='${selectedTool===t.name?'rgba(6,182,212,0.08)':'transparent'}'">
          ${t.name}
        </div>
      `).join('');
    }

    function selectTool(name) {
      selectedTool = name;
      const tool = allTools.find(t => t.name === name);
      document.getElementById('selected-tool').textContent = name;
      document.getElementById('selected-desc').textContent = (tool?.description || '').slice(0, 80);
      document.getElementById('execute-btn').disabled = false;
      renderToolList(allTools);
    }

    function filterTools() {
      const q = document.getElementById('tool-search').value.toLowerCase();
      renderToolList(allTools.filter(t => t.name.includes(q)));
    }

    async function executeCall() {
      if (!selectedTool) return;
      const start = Date.now();
      document.getElementById('response-body').textContent = '// Executing...';
      document.getElementById('response-body').style.color = 'var(--t-text-muted)';

      // NOTE: This is a simulated response for the explorer UI.
      // In production, this would call the actual tool execution endpoint.
      setTimeout(() => {
        const elapsed = Date.now() - start;
        document.getElementById('response-time').textContent = `${elapsed}ms`;
        document.getElementById('response-body').style.color = 'var(--t-emerald)';
        document.getElementById('response-body').textContent = JSON.stringify({
          jsonrpc: "2.0",
          id: Date.now(),
          result: {
            tool: selectedTool,
            status: "success",
            executedVia: "toolRegistry.execute()",
            pattern: "direct-sdk",
            timestamp: new Date().toISOString(),
            note: "Connect /api/tools/execute endpoint for live execution"
          }
        }, null, 2);
      }, 200 + Math.random() * 300);
    }

    loadTools();
  </script>
</body>
</html>
