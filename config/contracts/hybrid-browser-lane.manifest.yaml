apiVersion: truth.system/v1alpha1
kind: FeatureImplementationContract
metadata:
  name: hybrid-browser-lane
  version: 1.0.0
  description: Shared-state interactive Chrome session for human-AI co-piloting.
spec:
  chrome_bridge:
    name: "Truth Chrome Bridge"
    distribution: "Chrome MV3 extension"
    install_required: true
    source: "extensions/truth-chrome-bridge"
    role: "First-class product browser for user-owned Chrome sessions."
    transport:
      command_channel: "content-script to MV3 runtime port"
      video: "chrome.tabCapture + offscreen document + WebRTC PeerConnection"
      input: "chrome.debugger CDP Input domain"
      dom: "chrome.scripting sanitized DOM read"
    modes:
      - "Open URL"
      - "Connect Active Tab"
      - "Review Mode"
    safety:
      - "Extension install is the user permission boundary."
      - "Agent actions are explicit, auditable, and revocable."
      - "Credentials, MFA, cookies, payment data, and sensitive form values remain human-controlled."
  environments:
    local:
      transport: direct
      display: local_window_or_iframe
      browserArgs:
        - "--remote-debugging-port=9222"
        - "--user-data-dir=./.browser_data"
      routes:
        frontend: "http://localhost:3000/browser"
        cdp: "ws://localhost:9222/devtools/browser"
    gcp_production:
      transport: webrtc_or_novnc
      display: virtual_framebuffer_xvfb
      container: "google-cloud-workstations/headless-chrome:latest"
      ports:
        cdp: 9222
        stream: 6080

  constraints:
    - browser_core: true
      rule: "Default web-page handling is a single normal browser page session: navigate, render, inspect, screenshot, and expose status, URL, title, DOM, screenshot, and errors."
    - automation_explicit: true
      rule: "Assistant clicks, typing, scrolling, retries, research, crawling, and multi-source fan-out require explicit user intent or an explicit higher-level mode."
    - no_stealth_bypass: true
      rule: "The browser lane is a trustworthy user-agent surface, not a stealth, bot-detection bypass, or anti-challenge product."
    - isolation: true
      rule: "AI operations must execute on the identical CDP target as the human viewport."
    - security: true
      rule: "Human handles sensitive input (Auth/CAPTCHA). AI acts post-auth."
    - observability: true
      rule: "All AI CDP actions must pipe through ToolTrace logger."

  acceptance_criteria:
    - "Real Chrome/Chromium session launches."
    - "Human sees the browser immediately."
    - "Human can type URLs, search, click, scroll, log in, and browse normally."
    - "AI browser tools attach to the same session via WS/CDP."
    - "AI can navigate, inspect DOM, extract text/tables, screenshot, click, and scroll."
    - "Browser navigation does not secretly crawl, parallel-fetch, retry-loop, fan out, stealth, or bypass site challenges."
