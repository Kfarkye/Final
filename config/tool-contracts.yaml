      - get_team_f5_profile
      - get_team_form
      - get_team_intelligence_card
      - get_team_market_profit
      - get_team_strength
      - get_team_yrfi_nrfi
    # ── Executable Contract ──
    # When this contract matches, these tools are called AUTOMATICALLY
    # before the LLM runs. Results are injected as grounding context.
    # The LLM never needs to "decide" to fetch pitchers — they're already there.
    prefetch:
      - tool: get_espn_scoreboard
        args: {}
      - tool: get_espn_pitchers
        args: {}

