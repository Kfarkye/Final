contracts:
  # ═══════════════════════════════════════════════════════════════════════
  # ALWAYS-ON: Minimal core tools included in every request
  # ═══════════════════════════════════════════════════════════════════════
  - id: core
    name: Core System
    always: true
    tools:
      - get_current_time
      - run_script
      - execute_javascript

  # ═══════════════════════════════════════════════════════════════════════
  # WEB RESEARCH & SCRAPING
  # ═══════════════════════════════════════════════════════════════════════
  - id: web-research
    name: Web Research & Scraping
    keywords:
      - search
      - fetch
      - scrape
      - website
      - url
      - research
      - article
      - news
      - browse
      - link
      - sitemap
      - robots
      - rss
      - xml
      - markdown
      - html
      - web
      - google
      - source
      - cite
      - find online
      - look up
    tools:
      - search_web
      - fetch_html
      - fetch_json
      - fetch_text
      - fetch_headers
      - fetch_rss
      - fetch_sitemap
      - fetch_robots
      - fetch_url_batch
      - http_request
      - fetch_xml
      - fetch_markdown
      - extract_page
      - research_sources
      - research_report
      - fetch_readable

  # ═══════════════════════════════════════════════════════════════════════
  # GOOGLE WORKSPACE (Drive, Gmail, Calendar)
  # ═══════════════════════════════════════════════════════════════════════
  - id: google-workspace
    name: Google Workspace
    keywords:
      - email
      - gmail
      - drive
      - calendar
      - event
      - meeting
      - schedule
      - document
      - file
      - inbox
      - unread
      - draft
      - send email
      - availability
      - appointment
      - google doc
      - spreadsheet
    tools:
      - search_drive
      - read_drive_file
      - create_drive_file
      - list_unread_emails
      - get_email_thread
      - send_email_draft
      - get_upcoming_events
      - create_calendar_event
      - check_availability

  # ═══════════════════════════════════════════════════════════════════════
  # CLOUD SPANNER DATABASE
  # ═══════════════════════════════════════════════════════════════════════
  - id: spanner
    name: Cloud Spanner Database
    always: true
    keywords:
      - spanner
      - database
      - sql
      - query
      - table
      - schema
      - ddl
      - instance
      - clearspace
      - core-db
      - select
      - insert
      - update
      - delete
      - db
    tools:
      - list_instances
      - list_databases
      - get_database_ddl
      - execute_sql

  # ═══════════════════════════════════════════════════════════════════════
  # SPORTS BETTING & LIVE ODDS
  # ═══════════════════════════════════════════════════════════════════════
  - id: betting
    name: Sports Betting & Live Odds
    keywords:
      - odds
      - betting
      - moneyline
      - spread
      - total
      - over
      - under
      - sportsbook
      - draftkings
      - fanduel
      - betmgm
      - pinnacle
      - mlb
      - nba
      - nfl
      - prop
      - line
      - wager
      - game
      - player prop
      - strikeout
      - home run
      - baseball
      - basketball
      - football
      - soccer
      - sharp
      - ev
      - expected value
    tools:
      - get_live_odds
      - get_scores
      - list_sports
      - list_events
      - get_event_odds
      - check_odds_quota
      - get_historical_odds
      - ingest_historical_odds

  # ═══════════════════════════════════════════════════════════════════════
  # STRIPE & PAYMENTS
  # ═══════════════════════════════════════════════════════════════════════
  - id: payments
    name: Stripe & Payments
    keywords:
      - stripe
      - payment
      - balance
      - subscription
      - customer
      - billing
      - revenue
      - charge
      - invoice
      - plan
      - pricing
    tools:
      - balance_read
      - customers_search
      - subscriptions_cancel

  # ═══════════════════════════════════════════════════════════════════════
  # LINEAR PROJECT MANAGEMENT
  # ═══════════════════════════════════════════════════════════════════════
  - id: project-management
    name: Linear Project Management
    keywords:
