contracts:
  # ═══════════════════════════════════════════════════════════════════════
  # ALWAYS-ON: Minimal core tools included in every request
  # ═══════════════════════════════════════════════════════════════════════
  - id: core
    name: Core System
    always: true
    tools:
      - get_current_time
      - run_script
      - execute_javascript

  # ═══════════════════════════════════════════════════════════════════════
  # WEB RESEARCH & SCRAPING
  # ═══════════════════════════════════════════════════════════════════════
  - id: web-research
    name: Web Research & Scraping
    keywords:
      - search
      - fetch
      - scrape
      - website
      - url
      - research
      - article
      - news
      - browse
      - link
      - sitemap
      - robots
      - rss
      - xml
      - markdown
      - html
      - web
      - google
      - source
      - cite
      - find online
      - look up
    tools:
      - search_web
      - fetch_html
      - fetch_json
      - fetch_text
      - fetch_headers
      - fetch_rss
      - fetch_sitemap
      - fetch_robots
      - fetch_url_batch
      - http_request
      - fetch_xml
      - fetch_markdown
      - extract_page
      - research_sources
      - research_report
      - fetch_readable

  # ═══════════════════════════════════════════════════════════════════════
  # GOOGLE WORKSPACE (Drive, Gmail, Calendar)
  # ═══════════════════════════════════════════════════════════════════════
  - id: google-workspace
    name: Google Workspace
    keywords:
      - email
      - gmail
      - drive
      - calendar
      - event
      - meeting
      - schedule
      - document
      - file
      - inbox
      - unread
      - draft
      - send email
      - availability
      - appointment
      - google doc
      - spreadsheet
    tools:
      - search_drive
      - read_drive_file
      - create_drive_file
      - list_unread_emails
      - get_email_thread
      - send_email_draft
      - get_upcoming_events
      - create_calendar_event
      - check_availability

  # ═══════════════════════════════════════════════════════════════════════
  # CLOUD SPANNER DATABASE
  # ═══════════════════════════════════════════════════════════════════════
  - id: spanner
    name: Cloud Spanner Database
    always: true
    keywords:
      - spanner
      - database
      - sql
      - query
      - table
      - schema
      - ddl
      - instance
      - clearspace
      - core-db
      - select
      - insert
      - update
      - delete
      - db
    tools:
      - list_instances
      - list_databases
      - get_database_ddl
      - execute_sql

  # ═══════════════════════════════════════════════════════════════════════
  # MLB — Games, Pitchers, Stats (ESPN + MLB Stats API)
  # Any MLB query always gets pitchers + scoreboard together
  # ═══════════════════════════════════════════════════════════════════════
  - id: mlb
    name: MLB Games & Stats
    keywords:
      - mlb
      - baseball
      - game today
      - games today
      - today's games
      - tonight's games
      - pitcher
      - pitchers
      - probable
      - probables
      - starting pitcher
      - scoreboard
      - box score
      - boxscore
      - standings
      - roster
      - yankees
      - dodgers
      - mets
      - red sox
      - cubs
      - braves
      - phillies
      - astros
      - padres
      - orioles
      - guardians
      - twins
      - rangers
      - rays
      - mariners
      - tigers
      - royals
      - brewers
      - cardinals
      - diamondbacks
      - giants
      - pirates
      - reds
      - marlins
      - rockies
      - angels
      - white sox
      - nationals
      - athletics
      - blue jays
      - inning
      - home run
      - strikeout
      - era
      - batting average
      - rbi
      - play by play
      - live game
      - final score
    tools:
      - get_espn_scoreboard
      - get_espn_pitchers
      - get_espn_game
      - find_espn_game
      - get_espn_live_games
      - get_espn_final_scores
      - get_mlb_schedule
      - get_mlb_boxscore
      - get_mlb_standings
      - get_mlb_roster
      - get_mlb_player_stats
      - search_mlb_player
      - get_mlb_play_by_play
      - get_mlb_teams
    # ── Executable Contract ──
    # When this contract matches, these tools are called AUTOMATICALLY
    # before the LLM runs. Results are injected as grounding context.
    # The LLM never needs to "decide" to fetch pitchers — they're already there.
    prefetch:
      - tool: get_espn_scoreboard
        args: {}
      - tool: get_espn_pitchers
        args: {}

