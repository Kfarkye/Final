steps:
  # Verify types before attempting to build
  # NOTE: lint gate is NON-BLOCKING on first run (|| echo). The codebase had no
  # tsconfig.json until now and has never been type-checked, so we surface the
  # true error count WITHOUT bricking the deploy. Once a clean run is observed
  # (or errors are fixed), delete the "|| echo ..." to make this a HARD gate.
  - name: 'node:24-slim'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        npm ci --legacy-peer-deps
        npm run lint || echo "⚠️  TYPECHECK FAILED — non-blocking on first run. Review errors above, then flip to hard gate."

  # Build with kaniko — cached layers, pushes to Artifact Registry
  - name: 'gcr.io/kaniko-project/executor:latest'
    args:
      - '--dockerfile=Dockerfile'
      - '--destination=us-central1-docker.pkg.dev/$PROJECT_ID/truth/reverie:$_IMAGE_TAG'
      - '--destination=us-central1-docker.pkg.dev/$PROJECT_ID/truth/reverie:latest'
      - '--cache=true'
      - '--cache-ttl=168h'
      - '--compressed-caching=false'
      - '--snapshot-mode=redo'
      - '--context=.'

  # Deploy the immutable SHA-tagged image to GKE Autopilot
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: bash
    args:
      - '-c'
      - |
        gcloud container clusters get-credentials truth-cluster --region=us-central1 --project=$PROJECT_ID
        kubectl apply -f k8s/backend-config.yaml
        kubectl apply -f k8s/service.yaml
        kubectl apply -f k8s/deployment.yaml
        kubectl set image deployment/reverie reverie=us-central1-docker.pkg.dev/$PROJECT_ID/truth/reverie:$_IMAGE_TAG
        kubectl rollout status deployment/reverie --timeout=300s

timeout: '1800s'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

substitutions:
  _IMAGE_TAG: 'latest'
